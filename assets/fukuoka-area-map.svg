    <path d="M172 502c-16-6-34 1-42 16-7 13-3 29 8 39 13 12 34 12 48 1 13-10 17-28 9-42-5-8-13-12-23-14z" fill="#fff1c8" stroke="#d2ac82" stroke-width="4" opacity="0.72"/>
