<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 690" role="img" aria-labelledby="title desc">
  <title id="title">福岡県のやさしい地図イラスト</title>
  <desc id="desc">福岡県全域を表す、ベージュと淡い黄色のやさしい水彩風マップです。</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#8d6b4e" flood-opacity="0.08"/>
    </filter>
    <filter id="paper" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <linearGradient id="mapFill" x1="12%" y1="8%" x2="88%" y2="92%">
      <stop offset="0" stop-color="#fff8e9"/>
      <stop offset="0.48" stop-color="#fff0c7"/>
      <stop offset="1" stop-color="#ffe1c8"/>
    </linearGradient>
    <radialGradient id="warmWash" cx="55%" cy="48%" r="58%">
      <stop offset="0" stop-color="#fffdf7" stop-opacity="0.62"/>
      <stop offset="0.58" stop-color="#fff3cf" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#f5bf9d" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

